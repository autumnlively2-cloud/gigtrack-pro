services:
  - type: web
    name: gigtrack-pro
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gigtrack-db
          property: connectionString
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_BUSINESS
        sync: false
      - key: UBER_CLIENT_ID
        sync: false
      - key: UBER_CLIENT_SECRET
        sync: false
      - key: LYFT_CLIENT_ID
        sync: false
      - key: LYFT_CLIENT_SECRET
        sync: false

databases:
  - name: gigtrack-db
    databaseName: gigtrack
    user: gigtrack
    plan: starter
